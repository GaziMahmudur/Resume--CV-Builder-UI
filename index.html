<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeForge | Professional CV Builder</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- html2pdf CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="topbar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            ResumeForge
        </div>

        <div class="template-picker" id="template-picker">
            <button class="template-btn active" data-template="classic">Classic Dark</button>
            <button class="template-btn" data-template="warm">Editorial Warm</button>
            <button class="template-btn" data-template="clean">Clean White</button>
        </div>

        <div class="topbar-actions">
            <div id="overflow-warning" class="overflow-warning">⚠ Content may overflow to page 2</div>
            <a href="#" class="clear-link" id="clear-data">Clear Data</a>
            <button class="btn-primary" id="download-pdf" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PDF
            </button>
        </div>
    </header>

    <div class="main-container">
        <!-- LEFT PANEL: FORM EDITOR -->
        <aside class="form-panel">
            <nav class="tabs-nav" id="tabs-nav">
                <div class="tab-link active" data-tab="personal">Personal</div>
                <div class="tab-link" data-tab="summary">Summary</div>
                <div class="tab-link" data-tab="experience">Experience</div>
                <div class="tab-link" data-tab="education">Education</div>
                <div class="tab-link" data-tab="skills">Skills</div>
                <div class="tab-link" data-tab="projects">Projects</div>
                <div class="tab-link" data-tab="extras">Extras</div>
            </nav>

            <div class="form-content" id="form-container">
                <!-- PERSONAL TAB -->
                <div class="tab-pane active" id="pane-personal">
                    <div class="photo-upload-wrapper">
                        <div class="photo-preview-circle" id="photo-preview">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <div style="flex: 1">
                            <label>Profile Photo</label>
                            <input type="file" id="input-photo" accept="image/*" style="font-size: 12px">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="p-name" placeholder="Arif Rahman" class="cv-input" data-path="personal.name">
                    </div>
                    <div class="form-group">
                        <label>Job Title / Headline</label>
                        <input type="text" id="p-title" placeholder="Junior Web Developer" class="cv-input" data-path="personal.title">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="p-email" placeholder="arif@example.com" class="cv-input" data-path="personal.email">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" id="p-phone" placeholder="+880 1234 567890" class="cv-input" data-path="personal.phone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="p-location" placeholder="Dhaka, Bangladesh" class="cv-input" data-path="personal.location">
                    </div>
                    <div class="form-group">
                        <label>LinkedIn URL</label>
                        <input type="url" id="p-linkedin" placeholder="linkedin.com/in/username" class="cv-input" data-path="personal.linkedin">
                    </div>
                    <div class="form-group">
                        <label>GitHub URL</label>
                        <input type="url" id="p-github" placeholder="github.com/username" class="cv-input" data-path="personal.github">
                    </div>
                    <div class="form-group">
                        <label>Portfolio URL</label>
                        <input type="url" id="p-portfolio" placeholder="yourportfolio.com" class="cv-input" data-path="personal.portfolio">
                    </div>
                </div>

                <!-- SUMMARY TAB -->
                <div class="tab-pane" id="pane-summary">
                    <div class="form-group">
                        <label>Professional Summary</label>
                        <textarea id="p-summary" placeholder="Write a brief 3-5 sentence bio about your career goals and achievements..." class="cv-input" data-path="summary.text" maxlength="600"></textarea>
                        <div class="char-counter" id="summary-counter">0/600</div>
                    </div>
                </div>

                <!-- EXPERIENCE TAB -->
                <div class="tab-pane" id="pane-experience">
                    <div id="experience-list"></div>
                    <button class="btn-add" id="add-experience">＋ Add Experience</button>
                </div>

                <!-- EDUCATION TAB -->
                <div class="tab-pane" id="pane-education">
                    <div id="education-list"></div>
                    <button class="btn-add" id="add-education">＋ Add Education</button>
                </div>

                <!-- SKILLS TAB -->
                <div class="tab-pane" id="pane-skills">
                    <div class="form-group">
                        <label>Technical Skills</label>
                        <div class="tag-input-container" id="tech-skills-container">
                            <input type="text" class="tag-input" placeholder="Type and press Enter..." id="tech-skill-input">
                        </div>
                        <p style="font-size: 11px; color: var(--text-muted); margin-top: 4px">Press Enter or Comma to add.</p>
                    </div>

                    <div class="form-group">
                        <label>Languages</label>
                        <div id="languages-list"></div>
                        <button class="btn-add" id="add-language">＋ Add Language</button>
                    </div>

                    <div class="form-group">
                        <label>Soft Skills</label>
                        <div class="tag-input-container" id="soft-skills-container">
                            <input type="text" class="tag-input" placeholder="e.g. Leadership, Communication..." id="soft-skill-input">
                        </div>
                    </div>
                </div>

                <!-- PROJECTS TAB -->
                <div class="tab-pane" id="pane-projects">
                    <div id="projects-list"></div>
                    <button class="btn-add" id="add-project">＋ Add Project</button>
                </div>

                <!-- EXTRAS TAB -->
                <div class="tab-pane" id="pane-extras">
                    <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="show-certs" class="cv-toggle" data-path="extras.showCerts">
                        <label style="margin:0">Show Certifications</label>
                    </div>
                    <div id="certs-section" style="display:none; margin-bottom: 24px;">
                        <div id="certs-list"></div>
                        <button class="btn-add" id="add-cert">＋ Add Certification</button>
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="show-awards" class="cv-toggle" data-path="extras.showAwards">
                        <label style="margin:0">Show Achievements / Awards</label>
                    </div>
                    <div id="awards-section" style="display:none; margin-bottom: 24px;">
                        <div id="awards-list"></div>
                        <button class="btn-add" id="add-award">＋ Add Award</button>
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="show-interests" class="cv-toggle" data-path="extras.showInterests">
                        <label style="margin:0">Show Interests</label>
                    </div>
                    <div id="interests-section" style="display:none">
                        <div class="tag-input-container" id="interests-container">
                            <input type="text" class="tag-input" placeholder="e.g. Photography, Chess..." id="interest-input">
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- RIGHT PANEL: PREVIEW -->
        <main class="preview-panel">
            <div class="preview-wrapper" id="preview-wrapper">
                <div id="cv-preview" class="template-classic"></div>
            </div>
        </main>
    </div>

    <div class="indicator" id="save-indicator">
        <div class="dot"></div>
        <span>Saved to local storage</span>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
</body>
</html>
